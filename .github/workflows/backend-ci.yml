# Backend CI/CD — Next.js app at repo root.
# Branch flow: feature/* → develop → staging → main (see README.md).
#


name: Backend CI

on:
  pull_request:
    branches: [develop, main, staging]
  push:
    branches: [develop, staging, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: "0"
  NODE_VERSION: "22"

jobs:
  quality-and-build:
    name: Install, lint, format, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Next.js build
        run: npm run build

