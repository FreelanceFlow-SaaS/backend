# Backend CI/CD — NestJS app at repo root.
# Branch flow: feature/* → develop → staging → main (see README.md).
#

name: Backend CI

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop, staging, main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: '0'
  NODE_VERSION: '22'

jobs:
  quality-and-build:
    name: Install, lint, format, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
        run: npm test

      - name: Next.js build
        run: npm run build

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE_LOWER}:${VERSION},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_LOWER}:${GITHUB_SHA},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          BUILD_ARGS=""
          for TAG in "${TAGS[@]}"; do BUILD_ARGS="$BUILD_ARGS -t $TAG"; done
          docker build $BUILD_ARGS -f Dockerfile .
          for TAG in "${TAGS[@]}"; do docker push "$TAG"; done

  deploy-staging:
    name: Deploy to Render (staging)
    runs-on: ubuntu-latest
    needs: publish-image
    environment: staging
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  load-test:
    name: Load test
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for service to be ready
        run: |
          echo "Waiting for staging to be healthy..."
          for i in $(seq 1 60); do
            if curl -fsS "${{ secrets.STAGING_URL }}/api/v1/health" > /dev/null 2>&1; then
              echo "Service is up after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Timeout: service did not respond after 5 minutes"
          exit 1

      - name: Run load test
        uses: grafana/k6-action@v0.2.0
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}/api/v1
        with:
          filename: load-test.js
          flags: --out json=results.json

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results.json

  deploy-production:
    name: Deploy to Render (production)
    runs-on: ubuntu-latest
    needs: publish-image
    environment: production
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
